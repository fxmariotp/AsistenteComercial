<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Comercial - Asistente Comercial</title>
  <link rel="icon" type="image/png" href="favicon.png?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #141a3b; /* Renosur Navy background */
      --blue: #357FBF; /* Renosur Blue */
      --blue2: #5aa5df; /* Renosur Sky Blue */
      --rs: 10px;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at center, #1f2757 0%, #101530 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #login-container {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: loginAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes loginAppear {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .login-logo {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(53, 127, 191, 0.3);
    }
    .login-logo svg {
      width: 26px;
      height: 26px;
      color: #fff;
    }
    .login-title {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 28px;
    }
    .login-field {
      margin-bottom: 16px;
    }
    .login-field input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--rs);
      font-size: 15px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      outline: none;
      text-align: center;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .login-field input:focus {
      border-color: var(--blue2);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(53, 127, 191, 0.2);
    }
    .login-field input::placeholder {
      color: #64748b;
      letter-spacing: 0px;
    }
    .login-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      font-weight: 600;
      min-height: 20px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: var(--rs);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(53, 127, 191, 0.2);
      width: 100%;
      height: 46px;
      margin-top: 8px;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(53, 127, 191, 0.3);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div id="login-container">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
    </div>
    <h2 class="login-title">Acceso Comercial</h2>
    <p class="login-sub">Introduce tu DNI para iniciar sesión</p>
    <div class="login-field">
      <input type="password" id="login-dni" placeholder="Escribe tu DNI (p. ej. 12345678A)" autocomplete="off" autofocus>
    </div>
    <button class="btn-primary" id="login-submit" onclick="attemptLogin()">Acceder</button>
    <div class="login-error" id="login-error-msg"></div>
  </div>
</div>

<script>
const COMERCIALES = {
  "20102738W": "ADRIAN ROJAS ROMERO",
  "47539234M": "ANA ROCIO GALERA MORILLO",
  "28727453Q": "BEGOÑA CABANILLAS PIQUERO",
  "47269867Z": "CHRISTIAN CABRERA MARQUEZ",
  "77976681B": "CLARA TORREÑO RUIZ",
  "28818524F": "CRISTINA SANTOS LARIOS",
  "77927459D": "FRANCISCO JOSE VAZQUEZ FERNANDEZ",
  "77860623B": "FRANCISCO MORENTE",
  "45812286N": "ISMAEL MILLAN GALLARDO",
  "47269866J": "JOSE MIGUEL CABRERA MARQUEZ",
  "51997096F": "MANUELA SALAZAR CORTES",
  "29537747C": "MARINA MARTINEZ DE LA ROSA",
  "77822813J": "MARIO TIBURCIO PORRAS",
  "30369873Y": "MERCEDES TERRON DIEZ",
  "77843286Q": "MIGUEL HERNANDEZ JIMÉNEZ",
  "53283415M": "MÓNICA CEJUDO HIDALGO",
  "PAPAEVARIA": "MIGUEL RODRIGUEZ FLORES"
};

// Check if user is already logged in
const dni = localStorage.getItem('comercial_dni');
const name = localStorage.getItem('comercial_nombre');
if (dni && name && COMERCIALES[dni] === name) {
  window.location.href = 'index.html';
}

function attemptLogin() {
  const input = document.getElementById('login-dni').value;
  const targetDni = input.trim().toUpperCase();
  const matchedName = COMERCIALES[targetDni];
  
  if (matchedName) {
    localStorage.setItem('comercial_dni', targetDni);
    localStorage.setItem('comercial_nombre', matchedName);
    document.getElementById('login-error-msg').textContent = "";
    window.location.href = 'index.html';
  } else {
    document.getElementById('login-error-msg').textContent = "El DNI ingresado no está registrado.";
  }
}

// Bind enter key
document.getElementById('login-dni').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    attemptLogin();
  }
});
</script>
</body>
</html>
